name: florapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.8.0
  flutter_svg: ^2.0.7
  firebase_core: ^3.15.1
  firebase_auth: ^5.5.4
  google_sign_in: ^6.3.0
  flutter_facebook_auth: ^7.1.0
  cloud_firestore: ^5.6.8
  get: ^4.6.5
  share_plus: ^11.0.0
  firebase_storage: ^12.4.6
  image_picker: ^1.1.1
  shared_preferences: ^2.0.15
  speech_to_text: 7.1.0
  permission_handler: ^12.0.0+1
  geocoding: ^4.0.0
  geolocator: ^14.0.1
  url_launcher: ^6.3.1
  intl: ^0.20.2
  firebase_messaging: ^15.2.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo2.svg
    - assets/slider1.svg
    - assets/slider2.svg
    - assets/slider3.svg
    - assets/flor1.svg
    - assets/flor2.svg
    - assets/flor3.svg
    - assets/ramos.svg
    - assets/artefactos.svg
    - assets/eventos.svg
    - assets/carteras.svg
    - assets/personalizados.svg
    - assets/arreglos.svg
    - assets/yape.png
    - assets/visa.png
    - assets/logo.png
